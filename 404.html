<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(59, 130, 246, 0.1);
            position: absolute;
            animation: scanline 4s linear infinite;
        }
        .glitch:hover {
            text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-300 font-mono overflow-hidden">
    
    <div class="scanline"></div>

    <div class="flex flex-col items-center justify-center min-h-screen p-4">
        
        <h1 class="text-[10rem] md:text-[15rem] font-black text-slate-800 leading-none select-none glitch transition-all">
            404
        </h1>

        <div class="max-w-xl w-full bg-slate-900/50 border border-slate-800 rounded-lg p-6 shadow-2xl backdrop-blur-sm">
            <div class="flex gap-2 mb-4">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>

            <div class="space-y-2 text-sm md:text-base">
                <p><span class="text-green-400">guest@pisicchio.dev:~$</span> <span class="text-blue-400">locate</span> page</p>
                <p class="text-red-400 font-bold uppercase tracking-widest">Error: Source not found.</p>
                <p class="opacity-60 italic mt-4">// It seems you've requested a route that doesn't exist in our current deployment.</p>
                
                <div class="mt-6 pt-4 border-t border-slate-800 flex justify-between items-center">
                    <a href="/" class="text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-2">
                        <span>cd /home</span>
                        <span class="animate-pulse">_</span>
                    </a>
                    <span class="text-xs opacity-40">System: Pisicchio Protocol</span>
                </div>
            </div>
        </div>
        
        <div class="absolute top-10 left-10 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-10 right-10 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl"></div>
    </div>

</body>
</html>
